<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Rayon Wonorejo</title>

<style>

    *{margin:0;padding:0;box-sizing:border-box}

    body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Segoe UI'}

   .box{background:#fff;padding:40px;border-radius:20px;width:90%;max-width:400px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.2)}

    h1{color:#8b5cf6;margin-bottom:20px}

    input{width:100%;padding:14px;margin:10px 0;border:2px solid #e5e7eb;border-radius:10px;font-size:16px}

    input:focus{border-color:#8b5cf6;outline:none}

    button{width:100%;padding:14px;background:linear-gradient(90deg,#8b5cf6,#ec4899);border:none;border-radius:10px;color:#fff;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px}

    button:hover{opacity:0.9}

</style>

</head>

<body>

    <div class="box">

        <h1>Rayon Wonorejo</h1>

        <input type="text" id="username" placeholder="Username" value="ketua">

        <input type="password" id="password" placeholder="Password" value="123">

        <button onclick="login()">Login</button>

        <p style="margin-top:15px;font-size:12px;color:#888">User: ketua | Pass: 123</p>

    </div>

<script>

    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbyNOnIVAkZNVLlqGSu1RIdr61DzlFfcqj7t-IVdwL6g8wRJ25gxbfadLG70MAFNDMpMQw/exec';

    function login() {

        const u = document.getElementById('username').value;

        const p = document.getElementById('password').value;

        const callbackName = 'cb' + Date.now();

        window[callbackName] = function(data) {

            if(data.status == 'sukses') {

                localStorage.setItem('user', JSON.stringify(data));

                window.location.href = 'dashboard.html';

            } else { alert('Username atau Password salah'); }

            document.head.removeChild(script);

            delete window[callbackName];

        }

        const script = document.createElement('script');

        script.src = `${URL_SCRIPT}?action=login&u=${u}&p=${p}&callback=${callbackName}`;

        document.head.appendChild(script);

    }

</script>

</body>

</html>
