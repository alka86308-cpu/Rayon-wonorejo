<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rayon Wonorejo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

    body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}

  .container{max-width:1000px;margin:0 auto}

  .card{background:#fff;padding:25px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,0.2);margin-bottom:20px}

    h1,h2,h3{color:#8b5cf6}

  .navbar{display:flex;justify-content:space-between;align-items:center}

  .btn-red{background:#ef4444;color:#fff;border:none;padding:10px 20px;border-radius:10px;cursor:pointer}

    table{width:100%;border-collapse:collapse} th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}

</style>

</head>

<body>

<div class="container" id="dashboard">

    <div class="card navbar">

        <h2>Rayon Wonorejo</h2>

        <button class="btn-red" onclick="logout()">Logout</button>

    </div>

    <div class="card"><h3 id="welcome">Halo</h3></div>

    <div class="card"><h3>📊 Data Siswa</h3><div id="dataSiswa">Loading...</div></div>

    <div class="card"><h3>💰 Data Keuangan</h3><div id="dataKeuangan">Loading...</div></div>

</div>



<script>

const URL = 'https://script.google.com/macros/s/AKfycbyNOnIVAkZNVLlqGSu1RIdr61DzlFfcqj7t-IVdwL6g8wRJ25gxbfadLG70MAFNDMpMQw/exec';

const user = {username:'ketua', role:'admin'}; // sementara bypass login

document.getElementById('welcome').innerText = `Halo ${user.username} 👋 | Role: ${user.role}`;



// Load Data

function load(url, target, callback){

    const cb = 'cb'+Date.now();

    window[cb] = function(data){

        if(!data || data.length==0){document.getElementById(target).innerHTML='Data kosong';return;}

        document.getElementById(target).innerHTML = callback(data);

    }

    let s = document.createElement('script');

    s.src = `${url}&callback=${cb}`;

    document.head.appendChild(s);

}



load(`${URL}?action=getSiswa`, 'dataSiswa', data => {

    let h = '<table><tr><th>Nama</th><th>Kelas</th></tr>';

    data.forEach(r => h += `<tr><td>${r.nama}</td><td>${r.kelas}</td></tr>`);

    return h+'</table>';

});



load(`${URL}?action=getKeuangan`, 'dataKeuangan', data => {

    let h = '<table><tr><th>Tanggal</th><th>Keterangan</th><th>Jumlah</th></tr>';

    data.forEach(r => h += `<tr><td>${r.tanggal}</td><td>${r.keterangan}</td><td>Rp ${r.jumlah}</td></tr>`);

    return h+'</table>';

});



function logout(){alert('Logout')}

</script>

</body>

</html>
