<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rayon Wonorejo</title>

<style>

    *{margin:0;padding:0;box-sizing:border-box}

    body{font-family:'Segoe UI';background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh}

  .login-container{height:100vh;display:flex;justify-content:center;align-items:center}

  .login-box{background:#fff;padding:40px;border-radius:20px;width:90%;max-width:400px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.2)}

    h1{color:#8b5cf6;margin-bottom:10px}

    input{width:100%;padding:14px;margin:10px 0;border:2px solid #e5e7eb;border-radius:10px;font-size:16px}

    button{width:100%;padding:14px;background:linear-gradient(90deg,#8b5cf6,#ec4899);border:none;border-radius:10px;color:#fff;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px}

    

  .dashboard{display:none;padding:20px}

  .navbar{background:#fff;padding:15px 20px;border-radius:15px;margin-bottom:20px;display:flex;justify-content:space-between}

  .card{background:#fff;padding:25px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.08);margin-bottom:20px}

    table{width:100%;border-collapse:collapse;margin-top:10px}

    th,td{padding:10px;border:1px solid #e5e7eb;text-align:left}

    th{background:#f3f4f6}

</style>

</head>

<body>



<!-- HALAMAN LOGIN -->

<div class="login-container" id="loginPage">

    <div class="login-box">

        <h1>Rayon Wonorejo</h1>

        <p>Silahkan Login</p>

        <input type="text" id="username" placeholder="Username" value="ketua">

        <input type="password" id="password" placeholder="Password" value="123">

        <button onclick="login()">Login</button>

        <p style="margin-top:15px;font-size:12px;color:#888">User: ketua | Pass: 123</p>

    </div>

</div>



<!-- HALAMAN DASHBOARD -->

<div class="dashboard" id="dashboardPage">

    <div class="navbar">

        <h2>Rayon Wonorejo</h2>

        <button onclick="logout()" style="width:auto;background:#ef4444">Logout</button>

    </div>

    <div class="card">

        <h3 id="welcome">Selamat Datang</h3>

    </div>

    <div class="card">

        <h3>Data Siswa</h3>

        <div id="dataSiswa">Loading data...</div>

    </div>

    <div class="card">

        <h3>Data Keuangan</h3>

        <div id="dataKeuangan">Loading data...</div>

    </div>

</div>





<script>

    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbyNOnIVAkZNVLlqGSu1RIdr61DzlFfcqj7t-IVdwL6g8wRJ25gxbfadLG70MAFNDMpMQw/exec';

    let currentUser = null;



    function login() {

        const u = document.getElementById('username').value;

        const p = document.getElementById('password').value;

        const callbackName = 'cb' + Date.now();

        

        window[callbackName] = function(data) {

            if(data.status == 'sukses') {

                currentUser = data;

                document.getElementById('loginPage').style.display = 'none';

                document.getElementById('dashboardPage').style.display = 'block';

                document.getElementById('welcome').innerText = `Halo ${data.username} | Role: ${data.role}`;

                loadData(); // langsung load data siswa & keuangan

            } else { 

                alert('Username atau Password salah'); 

            }

            document.head.removeChild(script);

            delete window[callbackName];

        }

        

        const script = document.createElement('script');

        script.src = `${URL_SCRIPT}?action=login&u=${u}&p=${p}&callback=${callbackName}`;

        document.head.appendChild(script);

    }



    function logout(){

        document.getElementById('loginPage').style.display = 'flex';

        document.getElementById('dashboardPage').style.display = 'none';

    }



    function loadData(){

        // Load Data Siswa

        const cb1 = 'cbSiswa' + Date.now();

        window[cb1] = function(data){

            let html = '<table><tr><th>Nama</th><th>Kelas</th></tr>';

            data.forEach(row => html += `<tr><td>${row.nama}</td><td>${row.kelas}</td></tr>`);

            html += '</table>';

            document.getElementById('dataSiswa').innerHTML = html;

        }

        let s1 = document.createElement('script');

        s1.src = `${URL_SCRIPT}?action=getSiswa&callback=${cb1}`;

        document.head.appendChild(s1);



        // Load Data Keuangan

        const cb2 = 'cbKeu' + Date.now();

        window[cb2] = function(data){

            let html = '<table><tr><th>Tanggal</th><th>Keterangan</th><th>Jumlah</th></tr>';

            data.forEach(row => html += `<tr><td>${row.tanggal}</td><td>${row.keterangan}</td><td>${row.jumlah}</td></tr>`);

            html += '</table>';

            document.getElementById('dataKeuangan').innerHTML = html;

        }

        let s2 = document.createElement('script');

        s2.src = `${URL_SCRIPT}?action=getKeuangan&callback=${cb2}`;

        document.head.appendChild(s2);

    }

</script>

</body>

</html>
