<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rayon Wonorejo v7.21</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

  body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

.hidden { display: none; }.card { backdrop-filter: blur(10px); background: rgba(255,255,255,0.95); }

  input,select { width:100%; padding:10px; border:2px solid #ddd; border-radius:10px; }

.disabled { opacity: 0.5; pointer-events: none; }

</style>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>



<!-- LOGIN -->

<div id="loginPage" class="min-h-screen flex items-center justify-center p-4">

  <div class="card p-8 rounded-3xl shadow-2xl w-96">

    <div class="text-center mb-6">

      <img src="logo.png" class="w-20 h-20 mx-auto mb-3 rounded-full border-4 border-purple-500">

      <h1 class="text-3xl font-bold text-purple-700">Rayon Wonorejo</h1>

    </div>

    <input id="username" type="text" placeholder="Username" class="mb-4">

    <input id="password" type="password" placeholder="Password" class="mb-4">

    <button onclick="doLogin()" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white p-3 rounded-xl font-bold">Login</button>

    <p id="loginError" class="text-red-500 text-sm mt-3 text-center hidden">Username/Password salah</p>

  </div>

</div>



<!-- MAIN APP -->

<div id="mainApp" class="hidden p-4">

  <div class="max-w-4xl mx-auto">

    <!-- HEADER -->

    <div class="card flex justify-between items-center p-4 rounded-2xl shadow-lg mb-6">

      <div class="flex items-center gap-3">

        <img src="logo.png" class="w-12 h-12 rounded-full">

        <div><h1 class="text-xl font-bold text-purple-700">Dashboard Rayon Wonorejo</h1><p>Halo, <b id="userNow"></b> <span id="roleNow" class="text-xs bg-purple-200 px-2 rounded-full"></span></p></div>

      </div>

      <div class="flex gap-2">

        <button onclick="showTab('setting')" id="btnSetting" class="bg-gray-500 text-white px-3 py-2 rounded-xl hidden">⚙️</button>

        <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded-xl">Logout</button>

      </div>

    </div>



    <!-- MENU -->

    <div id="menuUtama" class="grid grid-cols-3 gap-3 mb-6">

      <button id="btnDash" onclick="showTab('dashboard')" class="bg-orange-500 text-white p-3 rounded-xl font-semibold">📊 Dashboard</button>

      <button id="btnKeu" onclick="showTab('keuangan')" class="bg-green-500 text-white p-3 rounded-xl font-semibold">💰 Keuangan</button>

      <button id="btnSis" onclick="showTab('siswa')" class="bg-blue-500 text-white p-3 rounded-xl font-semibold">👨‍🎓 Siswa</button>

    </div>



    <!-- DASHBOARD -->

    <div id="tabDashboard">

      <div class="grid grid-cols-3 gap-3 mb-6">

        <div class="card p-4 rounded-2xl shadow text-center"><p class="text-gray-500 text-sm">Masuk</p><h2 id="totalMasuk" class="text-2xl font-bold text-green-600">Rp 0</h2></div>

        <div class="card p-4 rounded-2xl shadow text-center"><p class="text-gray-500 text-sm">Keluar</p><h2 id="totalKeluar" class="text-2xl font-bold text-red-600">Rp 0</h2></div>

        <div class="card p-4 rounded-2xl shadow text-center"><p class="text-gray-500 text-sm">Saldo</p><h2 id="totalSaldo" class="text-2xl font-bold text-blue-600">Rp 0</h2></div>

      </div>

      <div class="card p-5 rounded-2xl shadow"><canvas id="grafikKeu"></canvas></div>

    </div>



    <!-- KEUANGAN -->

    <div id="tabKeuangan" class="hidden">

      <div class="flex justify-between mb-4">

        <h2 class="text-2xl font-bold text-white">Data Keuangan</h2>

        <div class="flex gap-2">

          <button onclick="exportExcel('keuangan')" class="bg-green-500 text-white px-3 py-2 rounded-xl text-sm">📥 Excel</button>

          <button onclick="exportPDFKeu()" class="bg-red-500 text-white px-3 py-2 rounded-xl text-sm">📄 PDF</button>

          <button onclick="exportFotoKeu()" class="bg-blue-500 text-white px-3 py-2 rounded-xl text-sm">📷 Foto</button>

        </div>

      </div>



      <!-- FILTER KEUANGAN -->

      <div class="card p-4 rounded-2xl shadow mb-4 grid grid-cols-2 gap-3">

        <select id="filterBulan" onchange="renderKeu()">

          <option value="">Semua Bulan</option>

          <option value="01">Januari</option><option value="02">Februari</option><option value="03">Maret</option>

          <option value="04">April</option><option value="05">Mei</option><option value="06">Juni</option>

          <option value="07">Juli</option><option value="08">Agustus</option><option value="09">September</option>

          <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>

        </select>

        <select id="filterKegiatan" onchange="renderKeu()">

          <option value="">Semua Kegiatan</option>

          <option>Kas Warga</option><option>Kas Siswa</option><option>Lain-lain</option>

        </select>

      </div>



      <!-- FORM -->

      <div id="formKeu" class="card p-5 rounded-2xl shadow mb-4 space-y-3">

        <input id="tgl" type="date">

        <select id="kegiatan" onchange="toggleNamaField()">

          <option>Kas Warga</option><option>Kas Siswa</option><option>Lain-lain</option>

        </select>

        <select id="namaKeuSiswa" class="hidden"></select>

        <input id="namaKeuManual" placeholder="Nama Warga">

        <input id="jumlah" type="number" placeholder="Jumlah">

        <select id="tipe"><option>Masuk</option><option>Keluar</option></select>

        <button onclick="simpanKeu()" id="btnSimpanKeu" class="w-full bg-purple-600 text-white p-3 rounded-xl font-bold">Simpan Data</button>

      </div>

      <div id="listKeu" class="card p-4 rounded-2xl shadow overflow-x-auto"></div>

    </div>



    <!-- SISWA -->

    <div id="tabSiswa" class="hidden">

      <div class="flex justify-between mb-4">

        <h2 class="text-2xl font-bold text-white">Data Siswa</h2>

        <div class="flex gap-2">

          <button onclick="exportExcel('siswa')" class="bg-green-500 text-white px-3 py-2 rounded-xl text-sm">📥 Excel</button>

          <button onclick="exportPDFSis()" class="bg-red-500 text-white px-3 py-2 rounded-xl text-sm">📄 PDF</button>

          <button onclick="exportFotoSis()" class="bg-blue-500 text-white px-3 py-2 rounded-xl text-sm">📷 Foto</button>

        </div>

      </div>



      <!-- FILTER SISWA -->

      <div class="card p-4 rounded-2xl shadow mb-4 grid-cols-2 gap-3">

        <input id="filterNamaSis" onkeyup="renderSiswa()" placeholder="Cari Nama Siswa...">

        <select id="filterTingkatan" onchange="renderSiswa()">

          <option value="">Semua Tingkatan</option>

          <option>Polos</option><option>Jambon</option><option>Ijo</option><option>Putih</option>

        </select>

      </div>



      <div id="formSis" class="card p-5 rounded-2xl shadow mb-4 space-y-3">

        <input id="namaSis" placeholder="Nama">

        <select id="tingkatan">

          <option>Polos</option><option>Jambon</option><option>Ijo</option><option>Putih</option>

        </select>

        <input id="agama" placeholder="Agama">

        <input id="nik" placeholder="NIK">

        <input id="hp" placeholder="No HP">

        <input id="bb" placeholder="BB">

        <input id="alamat" placeholder="Alamat">

        <input id="leting" placeholder="Leting">

        <button onclick="simpanSiswa()" id="btnSimpanSis" class="w-full bg-purple-600 text-white p-3 rounded-xl font-bold">Simpan Data</button>

      </div>

      <div id="listSiswa" class="card p-4 rounded-2xl shadow overflow-x-auto"></div>

    </div>



    <!-- SETTING USER -->

    <div id="tabSetting" class="hidden">

      <h2 class="text-2xl font-bold text-white mb-4">Setting User</h2>

      <div id="listUser" class="card p-4 rounded-2xl shadow"></div>

    </div>

  </div>

</div>



<script>

const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbyNOnIVAkZNVLlqGSu1RIdr61DzlFfcqj7t-IVdwL6g8wRJ25gxbfadLG70MAFNDMpMQw/exec';

let currentUser = '', currentRole = '', editIndex = null, editType = '';

let dataKeu = [], dataSiswa = [], chart;



async function doLogin(){

  let u = document.getElementById('username').value; let p = document.getElementById('password').value;

  let res = await fetch(URL_SCRIPT + '?action=login&u='+u+'&p='+p); let data = await res.json();

  if(data.status == 'sukses'){

    currentUser = data.username; currentRole = data.role;

    document.getElementById('userNow').innerText = currentUser;

    document.getElementById('roleNow').innerText = currentRole;

    document.getElementById('loginPage').classList.add('hidden');

    document.getElementById('mainApp').classList.remove('hidden');

    setRoleAccess();

    loadData();

  } else { document.getElementById('loginError').classList.remove('hidden'); }

}



function setRoleAccess(){

  if(currentRole == 'ketua') document.getElementById('btnSetting').classList.remove('hidden');

  if(currentRole == 'bendahara'){ document.getElementById('btnSis').classList.add('disabled'); document.getElementById('formSis').classList.add('disabled'); }

  if(currentRole == 'sekretaris'){ document.getElementById('btnKeu').classList.add('disabled'); document.getElementById('formKeu').classList.add('disabled'); }

}



function logout(){ location.reload(); }

function showTab(tab){ ['tabDashboard','tabKeuangan','tabSiswa','tabSetting'].forEach(id=>document.getElementById(id).classList.add('hidden')); document.getElementById('tab'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.remove('hidden'); if(tab=='setting') loadUsers(); }



async function loadData(){ 

  let res = await fetch(URL_SCRIPT); let data = await res.json(); 

  dataKeu = data.keuangan; dataSiswa = data.siswa; 

  let opt = '<option value="">Pilih Nama Siswa</option>';

  dataSiswa.forEach(s=>{ opt += `<option>${s.nama}</option>`; });

  document.getElementById('namaKeuSiswa').innerHTML = opt;

  renderKeu(); renderSiswa(); renderDashboard(); 

}



function toggleNamaField(){

  let keg = document.getElementById('kegiatan').value;

  if(keg == 'Kas Siswa'){ document.getElementById('namaKeuSiswa').classList.remove('hidden'); document.getElementById('namaKeuManual').classList.add('hidden'); }

  else if(keg == 'Kas Warga'){ document.getElementById('namaKeuSiswa').classList.add('hidden'); document.getElementById('namaKeuManual').classList.remove('hidden'); }

  else { document.getElementById('namaKeuSiswa').classList.add('hidden'); document.getElementById('namaKeuManual').classList.add('hidden'); }

}



function renderDashboard(){ let masuk = dataKeu.filter(r=>r.tipe=='Masuk').reduce((a,b)=>a+Number(b.jumlah||0),0); let keluar = dataKeu.filter(r=>r.tipe=='Keluar').reduce((a,b)=>a+Number(b.jumlah||0),0); document.getElementById('totalMasuk').innerText = 'Rp '+masuk.toLocaleString(); document.getElementById('totalKeluar').innerText = 'Rp '+keluar.toLocaleString(); document.getElementById('totalSaldo').innerText = 'Rp '+(masuk-keluar).toLocaleString(); if(chart) chart.destroy(); chart = new Chart(document.getElementById('grafikKeu'), {type:'bar', data:{ labels:['Masuk','Keluar'], datasets:[{data:[masuk,keluar], backgroundColor:['#10b981','#ef4444']}] }}); }



function renderKeu(){

  let bulan = document.getElementById('filterBulan').value;

  let keg = document.getElementById('filterKegiatan').value;

  let filtered = dataKeu.filter(r=>{

    let bulanData = r.tanggal? r.tanggal.split('-')[1] : '';

    return (bulan=='' || bulanData==bulan) && (keg=='' || r.kegiatan==keg);

  });

  let html = '<table id="tabelKeu" class="w-full text-sm"><tr class="bg-purple-100"><th>Tgl</th><th>Kegiatan</th><th>Nama</th><th>Jumlah</th><th>Tipe</th><th>Aksi</th></tr>';

  filtered.forEach((r,i)=>{ 

    let realIndex = dataKeu.indexOf(r);

    html += `<tr><td>${r.tanggal}</td><td>${r.kegiatan}</td><td>${r.nama}</td><td>Rp ${Number(r.jumlah).toLocaleString()}</td><td>${r.tipe}</td><td>${(currentRole=='ketua'||currentRole=='bendahara')?`<button onclick="editKeu(${realIndex})" class="text-blue-500">Edit</button> <button onclick="hapusKeu(${realIndex})" class="text-red-500">Hapus</button>`:''}</td></tr>`; 

  }); 

  document.getElementById('listKeu').innerHTML = html+'</table>'; 

}



function renderSiswa(){

  let nama = document.getElementById('filterNamaSis').value.toLowerCase();

  let ting = document.getElementById('filterTingkatan').value;

  let filtered = dataSiswa.filter(r=>{

    return (nama=='' || r.nama.toLowerCase().includes(nama)) && (ting=='' || r.tingkatan==ting);

  });

  let html = '<table id="tabelSis" class="w-full text-sm"><tr class="bg-purple-100"><th>Nama</th><th>Tingkatan</th><th>HP</th><th>Aksi</th></tr>';

  filtered.forEach((r,i)=>{ 

    let realIndex = dataSiswa.indexOf(r);

    html += `<tr><td>${r.nama}</td><td>${r.tingkatan}</td><td>${r.hp}</td><td>${(currentRole=='ketua'||currentRole=='sekretaris')?`<button onclick="editSis(${realIndex})" class="text-blue-500">Edit</button> <button onclick="hapusSis(${realIndex})" class="text-red-500">Hapus</button>`:''}</td></tr>`; 

  }); 

  document.getElementById('listSiswa').innerHTML = html+'</table>'; 

}



async function simpanKeu(){ 

  let nama = document.getElementById('kegiatan').value=='Kas Siswa'? namaKeuSiswa.value : namaKeuManual.value;

  let p={action: editType=='keu'?'edit_keu':'tambah_keu', row:editIndex, tanggal:tgl.value, kegiatan:kegiatan.value, nama:nama, jumlah:jumlah.value, tipe:tipe.value, user:currentUser}; 

  await fetch(URL_SCRIPT, {method:'POST', body: JSON.stringify(p)}); alert('Tersimpan'); editIndex=null; editType=''; loadData(); 

}

async function hapusKeu(i){ if(confirm('Yakin hapus?')){ await fetch(URL_SCRIPT, {method:'POST', body: JSON.stringify({action:'hapus_keu', row:i})}); loadData(); } }

function editKeu(i){ editIndex=i; editType='keu'; let r=dataKeu[i]; tgl.value=r.tanggal; kegiatan.value=r.kegiatan; toggleNamaField(); if(r.kegiatan=='Kas Siswa') namaKeuSiswa.value=r.nama; else namaKeuManual.value=r.nama; jumlah.value=r.jumlah; tipe.value=r.tipe; }



async function simpanSiswa(){ let p={action: editType=='sis'?'edit_siswa':'tambah_siswa', row:editIndex, nama:namaSis.value, tingkatan:tingkatan.value, agama:agama.value, nik:nik.value, hp:hp.value, bb:bb.value, alamat:alamat.value, leting:leting.value, user:currentUser}; await fetch(URL_SCRIPT, {method:'POST', body: JSON.stringify(p)}); alert('Tersimpan'); editIndex=null; editType=''; loadData(); }

async function hapusSis(i){ if(confirm('Yakin hapus?')){ await fetch(URL_SCRIPT, {method:'POST', body: JSON.stringify({action:'hapus_siswa', row:i})}); loadData(); } }

function editSis(i){ editIndex=i; editType='sis'; let r=dataSiswa[i]; namaSis.value=r.nama; tingkatan.value=r.tingkatan; agama.value=r.agama; nik.value=r.nik; hp.value=r.hp; bb.value=r.bb; alamat.value=r.alamat; leting.value=r.leting; }



function exportExcel(type){ let data = type=='keuangan'?dataKeu:dataSiswa; let ws = XLSX.utils.json_to_sheet(data); let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, type); XLSX.writeFile(wb, type+".xlsx"); }



// EXPORT PDF KEUANGAN RAPI

async function exportPDFKeu(){

  const { jsPDF } = window.jspdf;

  let doc = new jsPDF();

  doc.addImage('logo.png', 'PNG', 14, 10, 20, 20);

  doc.setFontSize(16); doc.text('RAYON WONOREJO', 40, 18);

  doc.setFontSize(10); doc.text('Laporan Keuangan', 40, 24);

  let body = dataKeu.map(r=>[r.tanggal, r.kegiatan, r.nama, 'Rp '+Number(r.jumlah).toLocaleString(), r.tipe]);

  doc.autoTable({ startY: 35, head: [['Tanggal','Kegiatan','Nama','Jumlah','Tipe']], body: body });

  doc.save('Laporan_Keuangan.pdf');

}



// EXPORT FOTO KEUANGAN

async function exportFotoKeu(){

  let el = document.getElementById('listKeu');

  let canvas = await html2canvas(el);

  let link = document.createElement('a');

  link.download = 'Keuangan.png'; link.href = canvas.toDataURL(); link.click();

}



// EXPORT PDF SISWA RAPI

async function exportPDFSis(){

  const { jsPDF } = window.jspdf;

  let doc = new jsPDF();

  doc.addImage('logo.png', 'PNG', 14, 10, 20, 20);

  doc.setFontSize(16); doc.text('RAYON WONOREJO', 40, 18);

  doc.setFontSize(10); doc.text('Data Siswa', 40, 24);

  let body = dataSiswa.map(r=>[r.nama, r.tingkatan, r.hp, r.alamat]);

  doc.autoTable({ startY: 35, head: [['Nama','Tingkatan','HP','Alamat']], body: body });

  doc.save('Data_Siswa.pdf');

}



// EXPORT FOTO SISWA

async function exportFotoSis(){

  let el = document.getElementById('listSiswa');

  let canvas = await html2canvas(el);

  let link = document.createElement('a');

  link.download = 'Data_Siswa.png'; link.href = canvas.toDataURL(); link.click();

}



async function loadUsers(){ let res = await fetch(URL_SCRIPT + '?action=getUsers'); let users = await res.json(); let html = '<table class="w-full"><tr><th>Username</th><th>Role</th><th>Aksi</th></tr>'; users.forEach(u=>{ html += `<tr><td>${u.username}</td><td>${u.role}</td><td><button onclick="editUser('${u.username}')" class="text-blue-500">Edit</button></td></tr>`; }); document.getElementById('listUser').innerHTML = html+'</table>'; }

function editUser(user){ let newUser = prompt('Username Baru:', user); let newPass = prompt('Password Baru:'); if(newUser && newPass){ fetch(URL_SCRIPT, {method:'POST', body: JSON.stringify({action:'updateUser', oldUser:user, newUser:newUser, newPass:newPass})}).then(()=>{alert('Update sukses'); loadUsers();}); }

</script>

</body>

</html>
