<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<title>Login - Rayon Wonorejo</title>

<style>

    body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);height:100vh;display:flex;justify-content:center;align-items:center;font-family:'Segoe UI'}

  .box{background:#fff;padding:40px;border-radius:20px;width:90%;max-width:400px;text-align:center}

    input{width:100%;padding:14px;margin:10px 0;border:2px solid #e5e7eb;border-radius:10px}

    button{width:100%;padding:14px;background:linear-gradient(90deg,#8b5cf6,#ec4899);border:none;border-radius:10px;color:#fff;font-size:18px;font-weight:bold;cursor:pointer}

</style>

</head>

<body>

    <div class="box">

        <h1 style="color:#8b5cf6">Rayon Wonorejo</h1>

        <input type="text" id="username" placeholder="Username" value="ketua">

        <input type="password" id="password" placeholder="Password" value="123">

        <button onclick="login()">Login</button>

    </div>

<script>

    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbyNOnIVAkZNVLlqGSu1RIdr61DzlFfcqj7t-IVdwL6g8wRJ25gxbfadLG70MAFNDMpMQw/exec';

    function login() {

        const u = document.getElementById('username').value;

        const p = document.getElementById('password').value;

        const callbackName = 'cb' + Date.now();

        window[callbackName] = function(data) {

            if(data.status == 'sukses') {

                localStorage.setItem('user', JSON.stringify(data));

                window.location.href = 'dashboard.html';

            } else { alert('Username atau Password salah'); }

            document.head.removeChild(script);

        }

        const script = document.createElement('script');

        script.src = `${URL_SCRIPT}?action=login&u=${u}&p=${p}&callback=${callbackName}`;

        document.head.appendChild(script);

    }

</script>

</body>

</html>
