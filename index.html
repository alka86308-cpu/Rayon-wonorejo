<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Rayon Wonorejo</title>

<style>

    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

    body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);height:100vh;display:flex;justify-content:center;align-items:center}

   .login-box{background:#fff;padding:40px 30px;border-radius:20px;box-shadow:0 15px 35px rgba(0,0,0,0.2);width:90%;max-width:400px;text-align:center}

   .logo{width:100px;height:100px;border-radius:50%;border:4px solid #8b5cf6;margin-bottom:15px;object-fit:cover}

    h1{color:#8b5cf6;margin-bottom:25px;font-size:28px}

    input{width:100%;padding:14px;margin:10px 0;border:2px solid #e5e7eb;border-radius:10px;font-size:16px;outline:none;transition:0.3s}

    input:focus{border-color:#8b5cf6}

    button{width:100%;padding:14px;background:linear-gradient(90deg,#8b5cf6,#ec4899);border:none;border-radius:10px;color:#fff;font-size:18px;font-weight:bold;cursor:pointer;margin-top:15px;transition:0.3s}

    button:hover{transform:scale(1.02)}

    button:disabled{opacity:0.6;cursor:not-allowed}

</style>

</head>

<body>

    <div class="login-box">

        <img src="https://i.imgur.com/8Km9tLL.png" class="logo" alt="Logo Rayon"> <!-- GANTI LINK LOGO KAMU DISINI -->

        <h1>Rayon Wonorejo</h1>

        <input type="text" id="username" placeholder="Username" value="ketua">

        <input type="password" id="password" placeholder="Password" value="123">

        <button id="btnLogin" onclick="login()">Login</button>

    </div>



<script>

    // URL APPS SCRIPT KAMU

    const URL_SCRIPT = 'https://script.google.com/macros/s/AKfycbyNOnIVAkZNVLlqGSu1RIdr61DzlFfcqj7t-IVdwL6g8wRJ25gxbfadLG70MAFNDMpMQw/exec';



    function login() {

        const u = document.getElementById('username').value;

        const p = document.getElementById('password').value;

        const btn = document.getElementById('btnLogin');

        

        if(u == '' || p == ''){

            alert('Username dan Password wajib diisi');

            return;

        }

        

        btn.innerText = 'Loading...';

        btn.disabled = true;



        const callbackName = 'cb' + Date.now();

        

        window[callbackName] = function(data) {

            if(data.status == 'sukses') {

                localStorage.setItem('user', JSON.stringify(data));

                window.location.href = 'dashboard.html'; // GANTI INI KE FILE DASHBOARD KAMU

            } else {

                alert('Username atau Password salah');

                btn.innerText = 'Login';

                btn.disabled = false;

            }

            document.head.removeChild(script);

            delete window[callbackName];

        }

        

        const script = document.createElement('script');

        script.src = `${URL_SCRIPT}?action=login&u=${u}&p=${p}&callback=${callbackName}`;

        script.onerror = function(){

            alert('Gagal konek ke server. Cek internet dan deployment Apps Script');

            btn.innerText = 'Login';

            btn.disabled = false;

        }

        document.head.appendChild(script);

    }



    document.getElementById('password').addEventListener('keypress', function(e){

        if(e.key === 'Enter') login();

    })

</script>

</body>

</html>
