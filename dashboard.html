<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Rayon Wonorejo</title>

<style>

    *{margin:0;padding:0;box-sizing:border-box}

    body{background:#f3f4f6;font-family:'Segoe UI'}

   .navbar{

        background:linear-gradient(90deg,#8b5cf6,#ec4899);color:#fff;

        padding:15px 20px;display:flex;justify-content:space-between;align-items:center;

    }

   .container{padding:20px;max-width:1000px;margin:0 auto}

   .card{

        background:#fff;padding:25px;border-radius:15px;

        box-shadow:0 5px 15px rgba(0,0,0,0.08);margin-bottom:20px;

    }

    h1{font-size:24px}

    h2{color:#8b5cf6;margin-bottom:15px}

    button{

        padding:10px 20px;background:#ef4444;color:#fff;border:none;

        border-radius:8px;cursor:pointer;font-weight:bold

    }

</style>

</head>

<body>

    <div class="navbar">

        <h1>Rayon Wonorejo</h1>

        <button onclick="logout()">Logout</button>

    </div>



    <div class="container">

        <div class="card">

            <h2>Selamat Datang</h2>

            <p id="welcome">Loading...</p>

        </div>



        <div class="card">

            <h2>Menu</h2>

            <p>✅ Data Siswa</p>

            <p>✅ Data Keuangan</p>

            <p>✅ Laporan</p>

        </div>

    </div>



<script>

    const user = JSON.parse(localStorage.getItem('user'));

    if(!user){ 

        window.location.href = 'index.html'; 

    }

    document.getElementById('welcome').innerText = `Halo ${user.username} | Role: ${user.role}`;

    

    function logout(){

        localStorage.removeItem('user');

        window.location.href = 'index.html';

    }

</script>

</body>

</html>
