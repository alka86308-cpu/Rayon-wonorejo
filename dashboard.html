<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Rayon Wonorejo</title>

<style>

    body{font-family:'Segoe UI';background:#f3f4f6;padding:20px}

    .box{background:#fff;padding:30px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,0.1)}

    h1{color:#8b5cf6}

</style>

</head>

<body>

    <div class="box">

        <h1>Selamat Datang!</h1>

        <p id="welcome"></p>

        <button onclick="logout()">Logout</button>

    </div>

<script>

    const user = JSON.parse(localStorage.getItem('user'));

    if(!user){ window.location.href = 'index.html'; }

    document.getElementById('welcome').innerText = `Halo ${user.username} - Role: ${user.role}`;

    

    function logout(){

        localStorage.removeItem('user');

        window.location.href = 'index.html';

    }

</script>

</body>

</html>
