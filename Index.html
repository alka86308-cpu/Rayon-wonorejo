<!DOCTYPE html>

<html lang="id">

<head>

<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rayon Wonorejo v7.6</title>

<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/8/8a/Logo_PSHT.png">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

*{box-sizing:border-box;font-family:'Segoe UI',Arial;margin:0}

body{background:#8B0000;min-height:100vh;padding-bottom:20px}

.header{background:#5a0000;color:#fff;text-align:center;padding:15px;display:flex;align-items:center;justify-content:center;gap:12px}

.header img{width:50px;height:50px;object-fit:contain}.header h1{font-size:22px;font-weight:bold;margin:0}

.login{max-width:400px;margin:40px auto;padding:25px;background:#fff;border-radius:12px}

.container{padding:10px;max-width:900px;margin:auto}.card{background:#fff;padding:15px;border-radius:10px;margin-bottom:12px}

input,select{width:100%;padding:10px;margin:6px 0;border:1px solid #ccc;border-radius:6px}

.btn{padding:12px;border:none;border-radius:8px;background:#8B0000;color:#fff;font-weight:bold;cursor:pointer;width:100%;margin:3px}

.btn2{padding:6px 10px;border:none;border-radius:4px;background:#8B0000;color:#fff;cursor:pointer;font-size:12px;margin:2px}

.btn-green{background:#16a34a}.btn-blue{background:#2563eb}.btn-red{background:#dc2626}.btn-orange{background:#d97706}.btn-yellow{background:#f59e0b}

.menu{display:flex;gap:8px;margin-bottom:12px}table{width:100%;border-collapse:collapse;margin-top:10px;font-size:13px}

th,td{border:1px solid #ddd;padding:8px}th{background:#8B0000;color:#fff}.hidden{display:none}

.ring{display:flex;gap:8px;margin:10px 0}.ring div{flex:1;background:#f5f5f5;padding:8px;border-radius:6px;text-align:center;font-size:13px}

.filter-bar{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap}.loading{text-align:center;color:#2563eb;font-weight:bold}

.export-area{background:#fff; color:#000; padding:20px; position:absolute; left:-9999px; width:800px}

.export-area h2{text-align:center; color:#8B0000}

.export-area table{width:100%; border-collapse:collapse; font-size:12px}

.export-area th{background:#8B0000; color:#fff; padding:8px}

.export-area td{padding:8px; border:1px solid #ddd}

</style>

</head>

<body>



<div class="header"><img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Logo_PSHT.png"><h1>RAYON WONOREJO PSHT</h1></div>



<div id="loginPage" class="login">

  <div style="text-align:center;margin-bottom:15px"><img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Logo_PSHT.png" style="width:80px"></div>

  <h3 style="text-align:center;color:#8B0000">LOGIN ADMIN</h3>

  <input id="user" placeholder="Username"><input id="pass" type="password" placeholder="Password">

  <button class="btn" onclick="login()">MASUK</button>

</div>



<div id="app" class="container hidden">

  <div style="display:flex;justify-content:space-between;color:#fff;margin-bottom:10px;align-items:center">

    <h3>Login: <span id="roleNow"></span></h3><button class="btn-red" style="width:100px" onclick="logout()">Logout</button>

  </div>

  <div class="menu">

    <button id="btnKeu" class="btn" onclick="showMenu('keuangan')">💰 Keuangan</button>

    <button id="btnSiswa" class="btn" onclick="showMenu('siswa')">👥 Data Siswa</button>

    <button id="btnSet" class="btn-orange" onclick="showMenu('set')">⚙️ Setting</button>

  </div>



  <div id="menu-keuangan" class="card">

    <h3>DATA KEUANGAN ONLINE</h3>

    <input id="tglKeu" type="date"><select id="ket"><option value="">Pilih Keterangan</option><option value="Kas Warga">Kas Warga</option><option value="Kas Siswa">Kas Siswa</option><option value="Kegiatan">Kegiatan</option><option value="Lain-lain">Lain-lain</option></select>

    <input id="kegiatan" placeholder="Nama Kegiatan" style="display:none"><input id="jml" type="number" placeholder="Jumlah Rp">

    <select id="tipe"><option value="masuk">Pemasukan</option><option value="keluar">Pengeluaran</option></select>

    <input type="hidden" id="editKeuRow">

    <button id="btnSimpanKeu" class="btn-green" onclick="simpanKeu()">Simpan Data</button><button id="btnBatalKeu" class="btn-red hidden" onclick="batalEditKeu()">Batal Edit</button>

    <p id="statusKeu" class="loading"></p><hr style="margin:10px 0">

    <div class="filter-bar"><input id="filterBulan" type="month" onchange="renderKeu()" style="flex:1"><select id="filterKet" onchange="renderKeu()" style="flex:1"><option value="">Semua Keterangan</option><option value="Kas Warga">Kas Warga</option><option value="Kas Siswa">Kas Siswa</option><option value="Kegiatan">Kegiatan</option><option value="Lain-lain">Lain-lain</option></select></div>

    <div class="ring"><div><b>Pemasukan</b><p id="totalMasuk">Rp 0</p></div><div><b>Pengeluaran</b><p id="totalKeluar">Rp 0</p></div><div><b>Saldo</b><p id="saldo">Rp 0</p></div></div>

    <table><thead><tr><th>No</th><th>Tgl</th><th>Keterangan</th><th>Kegiatan</th><th>Tipe</th><th>Jml</th><th>Aksi</th></tr></thead><tbody id="listKeu"></tbody></table>

    <button class="btn-blue" onclick="exportPDFKeu()">📄 Export PDF</button><button class="btn" style="background:#16a34a" onclick="exportJPGKeu()">📷 Export JPG</button>

  </div>



  <div id="menu-siswa" class="card hidden">

    <h3>DATA SISWA ONLINE</h3>

    <input id="nama" placeholder="Nama Lengkap"><select id="tingkatan"><option value="Polos">Polos</option><option value="Jambon">Jambon</option><option value="Ijo">Ijo</option><option value="Putih">Putih</option></select>

    <input id="nik" type="number" placeholder="NIK"><input id="hp" type="number" placeholder="No HP"><input id="bb" type="number" placeholder="BB Kg"><input id="alamat" placeholder="Alamat"><input id="leting" type="number" placeholder="Leting/Tahun">

    <input type="hidden" id="editSisRow">

    <button id="btnSimpanSis" class="btn-green" onclick="simpanSiswa()">Simpan Data</button><button id="btnBatalSis" class="btn-red hidden" onclick="batalEditSis()">Batal Edit</button>

    <p id="statusSis" class="loading"></p>

    <div class="filter-bar"><input id="searchSiswa" placeholder="🔍 Cari Nama Siswa..." onkeyup="renderSiswa()" style="flex:2"><select id="filterTingkat" onchange="renderSiswa()" style="flex:1"><option value="">Semua Tingkatan</option><option value="Polos">Polos</option><option value="Jambon">Jambon</option><option value="Ijo">Ijo</option><option value="Putih">Putih</option></select></div>

    <table><thead><tr><th>No</th><th>Nama</th><th>Tingkatan</th><th>NIK</th><th>HP</th><th>BB</th><th>Alamat</th><th>Leting</th><th>Aksi</th></tr></thead><tbody id="listSiswa"></tbody></table>

    <button class="btn-blue" onclick="exportPDFSiswa()">📄 Export PDF</button><button class="btn" style="background:#16a34a" onclick="exportJPGSiswa()">📷 Export JPG</button>

  </div>



  <div id="menu-set" class="card hidden">

    <h3>GANTI USERNAME & PASSWORD</h3><p style="font-size:12px;color:#dc2626;margin-bottom:10px">*Hanya Ketua</p>

    <select id="roleGanti"><option value="ketua">Ketua</option><option value="sekretaris">Sekretaris</option><option value="bendahara">Bendahara</option></select>

    <input id="userBaru" placeholder="Username Baru"><input id="passBaru" type="password" placeholder="Password Baru">

    <button class="btn" onclick="gantiAkun()">Simpan Perubahan</button>

  </div>

</div>



<div id="exportSiswa" class="export-area"></div><div id="exportKeu" class="export-area"></div>



<script>

const {jsPDF}=window.jspdf;

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxxEyAgCckNla8DX2-e4cMnDWEX21EEzXpExcQdL4zSxugAx_TWt1xIUrWhOTe0wXMOSw/exec';

let users=JSON.parse(localStorage.getItem('wr7_users'))||{ketua:'123',sekretaris:'123',bendahara:'123'};

let loginRole=null;let dataKeu=[], dataSiswa=[]; let dataLoaded=false;



document.addEventListener('DOMContentLoaded',()=>{document.getElementById('ket').addEventListener('change',function(){document.getElementById('kegiatan').style.display = this.value=='Kegiatan'?'block':'none';})});

function saveUsers(){localStorage.setItem('wr7_users',JSON.stringify(users));}

function login(){let u=document.getElementById('user').value.trim().toLowerCase();let p=document.getElementById('pass').value;if(users[u]&&users[u]==p){loginRole=u;document.getElementById('loginPage').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('roleNow').innerText=loginRole.toUpperCase();document.getElementById('btnKeu').style.display=(loginRole=='bendahara'||loginRole=='ketua')?'block':'none';document.getElementById('btnSiswa').style.display=(loginRole=='sekretaris'||loginRole=='ketua')?'block':'none';document.getElementById('btnSet').style.display=(loginRole=='ketua')?'block':'none';if(loginRole=='bendahara') showMenu('keuangan');else if(loginRole=='sekretaris') showMenu('siswa');else showMenu('keuangan');document.getElementById('filterBulan').value=new Date().toISOString().slice(0,7);document.getElementById('tglKeu').value=new Date().toISOString().slice(0,10);loadData();}else alert('Login Gagal!')}

function logout(){loginRole=null;document.getElementById('app').classList.add('hidden');document.getElementById('loginPage').classList.remove('hidden');}

function showMenu(id){document.getElementById('menu-keuangan').classList.add('hidden');document.getElementById('menu-siswa').classList.add('hidden');document.getElementById('menu-set').classList.add('hidden');document.getElementById('menu-'+id).classList.remove('hidden');if(!dataLoaded){loadData();}else{renderKeu();renderSiswa();}}



async function loadData(){if(dataLoaded) return;document.getElementById('statusKeu').innerText='Memuat data pertama kali...';const res = await fetch(SCRIPT_URL + '?action=lihat');const data = await res.json();dataKeu = data.keuangan || []; dataSiswa = data.siswa || [];dataLoaded=true; renderKeu(); renderSiswa();document.getElementById('statusKeu').innerText='';}



function renderKeu(){let bulan=document.getElementById('filterBulan').value;let filterKet=document.getElementById('filterKet').value;let kf=dataKeu.filter(k=> (!bulan||k.tanggal.startsWith(bulan)) && (!filterKet||k.ket==filterKet) );let m=kf.filter(k=>k.tipe=='masuk').reduce((a,b)=>a+Number(b.jumlah),0);let k=kf.filter(k=>k.tipe=='keluar').reduce((a,b)=>a+Number(b.jumlah),0);document.getElementById('totalMasuk').innerText='Rp '+m.toLocaleString('id-ID');document.getElementById('totalKeluar').innerText='Rp '+k.toLocaleString('id-ID');document.getElementById('saldo').innerText='Rp '+(m-k).toLocaleString('id-ID');document.getElementById('listKeu').innerHTML=kf.map((x,i)=>`<tr><td>${i+1}</td><td>${x.tanggal}</td><td>${x.ket}</td><td>${x.kegiatan||'-'}</td><td>${x.tipe}</td><td>Rp ${Number(x.jumlah).toLocaleString('id-ID')}</td><td><button class="btn2 btn-yellow" onclick="editKeu(${dataKeu.indexOf(x)})">Edit</button><button class="btn2 btn-red" onclick="hapusKeu(${dataKeu.indexOf(x)})">Hapus</button></td></tr>`).join('');}

function renderSiswa(){let search=document.getElementById('searchSiswa').value.toLowerCase();let filter=document.getElementById('filterTingkat').value;let sf=dataSiswa.filter(s=>s.nama.toLowerCase().includes(search) && (filter=='' || s.tingkatan==filter));document.getElementById('listSiswa').innerHTML=sf.map((x,i)=>`<tr><td>${i+1}</td><td>${x.nama}</td><td>${x.tingkatan}</td><td>${x.nik}</td><td>${x.hp}</td><td>${x.bb}</td><td>${x.alamat}</td><td>${x.leting}</td><td><button class="btn2 btn-yellow" onclick="editSiswa(${dataSiswa.indexOf(x)})">Edit</button><button class="btn2 btn-red" onclick="hapusSiswa(${dataSiswa.indexOf(x)})">Hapus</button></td></tr>`).join('');}



async function simpanKeu(){let row = document.getElementById('editKeuRow').value;let action = row === ''? 'tambah_keu' : 'edit_keu';let newData={tanggal:tglKeu.value,ket:ket.value,kegiatan:kegiatan.value,jumlah:jml.value,tipe:tipe.value,user:loginRole};if(!newData.tanggal||!newData.ket||!newData.jumlah)return alert('Isi Tanggal, Keterangan dan Jumlah');if(action=='tambah_keu'){dataKeu.push(newData);}else{dataKeu[row]=newData;}renderKeu(); batalEditKeu(); document.getElementById('statusKeu').innerText='Tersimpan!';fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:action,row:row,...newData})});}

function editKeu(i){let d=dataKeu[i];tglKeu.value=d.tanggal;ket.value=d.ket;kegiatan.value=d.kegiatan||'';document.getElementById('kegiatan').style.display=d.ket=='Kegiatan'?'block':'none';jml.value=d.jumlah;tipe.value=d.tipe;document.getElementById('editKeuRow').value=i;document.getElementById('btnSimpanKeu').innerText='Update Data';document.getElementById('btnBatalKeu').classList.remove('hidden');}

function batalEditKeu(){document.getElementById('editKeuRow').value='';tglKeu.value=new Date().toISOString().slice(0,10);ket.value='';kegiatan.value='';jml.value='';document.getElementById('kegiatan').style.display='none';document.getElementById('btnSimpanKeu').innerText='Simpan Data';document.getElementById('btnBatalKeu').classList.add('hidden');}

async function hapusKeu(i){if(confirm('Hapus data ini?')){dataKeu.splice(i,1);renderKeu();fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'hapus_keu',row:i})});}}



async function simpanSiswa(){let row = document.getElementById('editSisRow').value;let action = row === ''? 'tambah_siswa' : 'edit_siswa';let newData={nama:nama.value,tingkatan:tingkatan.value,nik:nik.value,hp:hp.value,bb:bb.value,alamat:alamat.value,leting:leting.value,user:loginRole};if(!newData.nama)return alert('Isi Nama');if(action=='tambah_siswa'){dataSiswa.push(newData);}else{dataSiswa[row]=newData;}renderSiswa(); batalEditSis(); document.getElementById('statusSis').innerText='Tersimpan!';fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:action,row:row,...newData})});}

function editSiswa(i){let d=dataSiswa[i];nama.value=d.nama;tingkatan.value=d.tingkatan;nik.value=d.nik;hp.value=d.hp;bb.value=d.bb;alamat.value=d.alamat;leting.value=d.leting;document.getElementById('editSisRow').value=i;document.getElementById('btnSimpanSis').innerText='Update Data';document.getElementById('btnBatalSis').classList.remove('hidden');}

function batalEditSis(){document.getElementById('editSisRow').value='';nama.value=nik.value=hp.value=bb.value=alamat.value=leting.value='';tingkatan.value='Polos';document.getElementById('btnSimpanSis').innerText='Simpan Data';document.getElementById('btnBatalSis').classList.add('hidden');}

async function hapusSiswa(i){if(confirm('Hapus data ini?')){dataSiswa.splice(i,1);renderSiswa();fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'hapus_siswa',row:i})});}}

function gantiAkun(){if(loginRole!='ketua')return alert('Hanya Ketua!');let roleLama=roleGanti.value;let ub=userBaru.value.trim().toLowerCase();let pb=passBaru.value;if(!ub||!pb)return alert('Isi semua');delete users[roleLama];users[ub]=pb;saveUsers();alert(`Berhasil!\nRole: ${roleLama.toUpperCase()}\nUser Baru: ${ub}`);userBaru.value='';passBaru.value=''}



// FUNGSI EXPORT BALIK LAGI

function exportPDFKeu(){let bulan=document.getElementById('filterBulan').value;let filterKet=document.getElementById('filterKet').value;let kf=dataKeu.filter(k=> (!bulan||k.tanggal.startsWith(bulan)) && (!filterKet||k.ket==filterKet) );let m=kf.filter(k=>k.tipe=='masuk').reduce((a,b)=>a+Number(b.jumlah),0);let k=kf.filter(k=>k.tipe=='keluar').reduce((a,b)=>a+Number(b.jumlah),0);let doc=new jsPDF();doc.setFontSize(16);doc.text("LAPORAN KEUANGAN RAYON WONOREJO",105,15,{align:"center"});doc.setFontSize(11);doc.text("Periode: "+(bulan?bulan:'Semua'),14,25);doc.text("Wonorejo, "+new Date().toLocaleDateString('id-ID'),14,32);doc.setFontSize(10);doc.text(`Total Pemasukan : Rp ${m.toLocaleString('id-ID')}`,14,42);doc.text(`Total Pengeluaran: Rp ${k.toLocaleString('id-ID')}`,14,49);doc.text(`Saldo Akhir : Rp ${(m-k).toLocaleString('id-ID')}`,14,56);doc.autoTable({startY:65,head:[['No','Tanggal','Keterangan','Kegiatan','Tipe','Jumlah']],body:kf.map((k,i)=>[i+1,k.tanggal,k.ket,k.kegiatan||'-',k.tipe=='masuk'?'Pemasukan':'Pengeluaran','Rp '+Number(k.jumlah).toLocaleString('id-ID')]),theme:'grid',headStyles:{fillColor:[139,0,0]},styles:{fontSize:9}});let y=doc.lastAutoTable.finalY+20;doc.text("Mengetahui,",105,y,{align:"center"});y+=15;doc.line(30,y,80,y);doc.line(130,y,180,y);doc.text("Ketua",55,y+5,{align:"center"});doc.text("Bendahara",155,y+5,{align:"center"});doc.save(`Laporan_Keuangan_${bulan||'Semua'}.pdf`);}

function exportJPGKeu(){let bulan=document.getElementById('filterBulan').value;let filterKet=document.getElementById('filterKet').value;let kf=dataKeu.filter(k=> (!bulan||k.tanggal.startsWith(bulan)) && (!filterKet||k.ket==filterKet) );let m=kf.filter(k=>k.tipe=='masuk').reduce((a,b)=>a+Number(b.jumlah),0);let k=kf.filter(k=>k.tipe=='keluar').reduce((a,b)=>a+Number(b.jumlah),0);let html = `<h2>LAPORAN KEUANGAN RAYON WONOREJO</h2><p>Periode: ${bulan||'Semua'}</p><p>Wonorejo, ${new Date().toLocaleDateString('id-ID')}</p><p><b>Total Pemasukan:</b> Rp ${m.toLocaleString('id-ID')}<br><b>Total Pengeluaran:</b> Rp ${k.toLocaleString('id-ID')}<br><b>Saldo:</b> Rp ${(m-k).toLocaleString('id-ID')}</p><table><tr><th>No</th><th>Tanggal</th><th>Keterangan</th><th>Kegiatan</th><th>Tipe</th><th>Jumlah</th></tr>`;kf.forEach((k,i)=>{html+=`<tr><td>${i+1}</td><td>${k.tanggal}</td><td>${k.ket}</td><td>${k.kegiatan||'-'}</td><td>${k.tipe}</td><td>Rp ${Number(k.jumlah).toLocaleString('id-ID')}</td></tr>`});html += `</table><br><br><p style="text-align:center">Mengetahui,<br><br><br>___________________ &nbsp;&nbsp;&nbsp;&nbsp; ___________________<br>Ketua &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Bendahara</p>`;document.getElementById('exportKeu').innerHTML = html;html2canvas(document.getElementById('exportKeu'), {scale: 2}).then(canvas => {let link = document.createElement('a');link.download = `Laporan_Keuangan_${bulan||'Semua'}.jpg`;link.href = canvas.toDataURL('image/jpeg', 0.95);link.click();});}

function exportPDFSiswa(){let doc=new jsPDF();doc.setFontSize(16);doc.text("DATA SISWA RAYON WONOREJO PSHT",105,15,{align:"center"});doc.setFontSize(10);doc.text("Wonorejo, "+new Date().toLocaleDateString('id-ID'),14,25);doc.autoTable({startY:30,head:[['No','Nama','Tingkatan','NIK','No HP','BB','Alamat','Leting']],body:dataSiswa.map((s,i)=>[i+1,s.nama,s.tingkatan,s.nik,s.hp,s.bb,s.alamat,s.leting]),theme:'grid',headStyles:{fillColor:[139,0,0]},styles:{fontSize:8}});doc.save('Data_Siswa_Wonorejo.pdf');}

function exportJPGSiswa(){let html = `<h2>DATA SISWA RAYON WONOREJO PSHT</h2><p>Wonorejo, ${new Date().toLocaleDateString('id-ID')}</p><table><tr><th>No</th><th>Nama</th><th>Tingkatan</th><th>NIK</th><th>No HP</th><th>BB</th><th>Alamat</th><th>Leting</th></tr>`;dataSiswa.forEach((s,i)=>{html+=`<tr><td>${i+1}</td><td>${s.nama}</td><td>${s.tingkatan}</td><td>${s.nik}</td><td>${s.hp}</td><td>${s.bb}</td><td>${s.alamat}</td><td>${s.leting}</td></tr>`});html += `</table>`;document.getElementById('exportSiswa').innerHTML = html;html2canvas(document.getElementById('exportSiswa'), {scale: 2}).then(canvas => {let link = document.createElement('a');link.download = 'Data_Siswa_Wonorejo.jpg';link.href = canvas.toDataURL('image/jpeg', 0.95);link.click();});}

</script>

</body>

</html>
